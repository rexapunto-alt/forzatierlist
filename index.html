<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft PvP Sıralamaları</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="images/minecraft_title.png" alt="Minecraft" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <h1 style="font-family: var(--font-display); color: var(--text-primary); margin: 0; display: none;">Minecraft</h1>
        </div>
        <div class="nav-links">
            <a href="#" class="nav-link active" data-page="overall">
                <span>🏠</span> Home
            </a>
            <a href="https://discord.gg/trtiers" class="nav-link discord-link" target="_blank" rel="noopener noreferrer">
                <span>💬</span> Discord
            </a>
        </div>
        <div class="search-container">
            <input type="text" class="search-bar" id="searchBar" placeholder="Oyuncu ara...">
            <span class="search-icon">🔍</span>
        </div>
    </nav>

    <div class="tabs-container">
        <div class="tab active" data-category="overall">
            <div class="tab-icon">🏆</div>
            <span>Overall</span>
        </div>
        <div class="tab" data-category="nethpot">
            <div class="tab-icon"><img src="images/nethpot.png" alt="Nethpot" onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='⚗️'; this.parentElement.style.fontSize='1.5rem';"></div>
            <span>Nethpot</span>
        </div>
        <div class="tab" data-category="axe">
            <div class="tab-icon"><img src="images/axe.png" alt="Axe" onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='🪓'; this.parentElement.style.fontSize='1.5rem';"></div>
            <span>Axe</span>
        </div>
        <div class="tab" data-category="smp">
            <div class="tab-icon"><img src="images/smp.png" alt="SMP" onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='🟢'; this.parentElement.style.fontSize='1.5rem';"></div>
            <span>SMP</span>
        </div>
        <div class="tab" data-category="ogv">
            <div class="tab-icon"><img src="images/gapple.png" alt="OGV" onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='🍎'; this.parentElement.style.fontSize='1.5rem';"></div>
            <span>OGV</span>
        </div>
        <div class="tab" data-category="pot">
            <div class="tab-icon"><img src="images/diapot.png" alt="Pot" onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='💎'; this.parentElement.style.fontSize='1.5rem';"></div>
            <span>Pot</span>
        </div>
        <div class="tab" data-category="crystal">
            <div class="tab-icon"><img src="images/vanilla.png" alt="Crystal" onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='⬡'; this.parentElement.style.fontSize='1.5rem';"></div>
            <span>Crystal</span>
        </div>
        <div class="tab" data-category="uhc">
            <div class="tab-icon"><img src="images/uhc.png" alt="UHC" onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='❤️'; this.parentElement.style.fontSize='1.5rem';"></div>
            <span>UHC</span>
        </div>
        <div class="tab" data-category="beast">
            <div class="tab-icon"><img src="images/beast.png" alt="Beast" onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='👹'; this.parentElement.style.fontSize='1.5rem';"></div>
            <span>Beast</span>
        </div>
        <div class="tab" data-category="mace">
            <div class="tab-icon"><img src="images/mace.png" alt="Mace" onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='🔨'; this.parentElement.style.fontSize='1.5rem';"></div>
            <span>Mace</span>
        </div>
        <div class="tab-indicator"></div>
    </div>

    <main>
        <!-- Overall Page -->
        <div class="page active" id="overall-page">
            <div class="overall-container">
                <h2 style="text-align: center; margin-bottom: 2rem; font-family: var(--font-display);">Genel Sıralama</h2>
                <div class="overall-table">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>PLAYER</th>
                                <th>REGION</th>
                                <th>TIERS</th>
                                <th>POINTS</th>
                            </tr>
                        </thead>
                        <tbody id="overall-tbody">
                            <!-- Will be populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Category Pages -->
        <div class="page" id="category-page">
            <div class="tier-container" id="tier-container">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 Minecraft PvP Sıralamaları. All rights reserved.</p>
    </footer>

    <!-- Player Profile Modal -->
    <div class="profile-card-overlay" id="profileOverlay" style="display: none;"></div>
    <div class="profile-card-container" id="profileContainer" style="display: none;">
        <div class="profile-card">
            <button class="close-button" id="closeProfile">×</button>
            <div class="header-bg"></div>
            <div class="profile-header">
                <img id="profileAvatar" src="" alt="">
                <div class="profile-info">
                    <div class="username" id="profileUsername"></div>
                    <div class="user-rank" id="profileRank"></div>
                    <div class="user-region" id="profileRegion"></div>
                    <a href="#" class="namemc-link" id="namemcLink" target="_blank" style="display: inline-block; margin-top: 12px; padding: 8px 16px; background: rgba(0,0,0,0.3); border-radius: 8px; color: white; text-decoration: none; font-size: 0.9rem;">
                        <span>n</span> NameMC ↗
                    </a>
                </div>
            </div>
            <div class="position-section">
                <div class="section-title">POSITION</div>
                <div class="position-bar" id="positionBar"></div>
            </div>
            <div class="tiers-section">
                <div class="tiers-grid" id="tiersGrid"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
